<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Village Life — Моя Деревня</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#4a7c3f;font-family:'Segoe UI',sans-serif;overflow:hidden;height:100vh;user-select:none}
#game{width:100%;height:100vh;position:relative;overflow:hidden}
#sky{position:absolute;top:0;left:0;right:0;height:40%;background:linear-gradient(180deg,#87CEEB 0%,#98d4ee 60%,#b8e6b8 100%)}
#sun{position:absolute;top:40px;right:80px;width:70px;height:70px;background:#FFD700;border-radius:50%;box-shadow:0 0 40px #FFD700,0 0 80px rgba(255,215,0,.3);animation:sunGlow 3s infinite alternate}
@keyframes sunGlow{0%{box-shadow:0 0 40px #FFD700,0 0 80px rgba(255,215,0,.3)}100%{box-shadow:0 0 60px #FFD700,0 0 100px rgba(255,215,0,.5)}}
.cloud{position:absolute;background:#fff;border-radius:50px;opacity:.9}
.cloud::before,.cloud::after{content:'';position:absolute;background:#fff;border-radius:50%}
#ground{position:absolute;bottom:0;left:0;right:0;height:65%;background:linear-gradient(180deg,#6db356 0%,#5a9a45 30%,#4a7c3f 100%)}
#village{position:absolute;bottom:10%;left:0;right:0;height:55%;display:flex;flex-wrap:wrap;justify-content:center;align-items:flex-end;gap:4px;padding:0 20px}
.building{position:relative;cursor:pointer;transition:transform .15s;display:flex;flex-direction:column;align-items:center}
.building:hover{transform:scale(1.05)}
.building .roof{width:100%;height:30px;border-radius:8px 8px 0 0}
.building .house{width:100%;border-radius:0 0 6px 6px;position:relative}
.building .door{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:25%;height:45%;background:#5a3a1a;border-radius:4px 4px 0 0;border:1px solid #3a2a0a}
.building .window{position:absolute;width:18%;height:20%;background:rgba(135,206,250,.7);border:2px solid #5a3a1a;border-radius:3px}
.building .window.lit{background:rgba(255,255,150,.8);box-shadow:0 0 8px rgba(255,255,150,.5)}
.building-label{text-align:center;font-size:10px;color:#fff;text-shadow:1px 1px 2px rgba(0,0,0,.5);margin-top:2px;font-weight:600}
.farm-plot{width:50px;height:40px;background:#8B4513;border-radius:4px;border:2px solid #654321;position:relative;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:22px}
.farm-plot:hover{outline:2px solid #FFD700}
#trees{position:absolute;bottom:15%;left:0;right:0;pointer-events:none}
.tree{position:absolute;bottom:0}
.tree-trunk{width:12px;height:30px;background:#8B4513;margin:0 auto;border-radius:2px}
.tree-top{width:40px;height:40px;background:#2d5a1e;border-radius:50%;margin-bottom:-8px;box-shadow:inset -5px -5px 10px rgba(0,0,0,.2)}
#family-panel{position:fixed;top:10px;left:10px;background:rgba(0,0,0,.75);color:#fff;padding:12px;border-radius:12px;font-size:13px;min-width:200px;z-index:100;backdrop-filter:blur(5px)}
#family-panel h3{color:#FFD700;margin-bottom:8px;font-size:15px;text-align:center}
.member{display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.1)}
.member-avatar{font-size:24px}
.member-info{flex:1}
.member-name{font-weight:600;font-size:12px}
.member-role{font-size:10px;color:#aaa}
.member-mood{font-size:10px}
#stats-panel{position:fixed;top:10px;right:10px;background:rgba(0,0,0,.75);color:#fff;padding:12px;border-radius:12px;font-size:13px;min-width:160px;z-index:100;backdrop-filter:blur(5px)}
#stats-panel h3{color:#FFD700;margin-bottom:8px;font-size:15px;text-align:center}
.stat{display:flex;justify-content:space-between;padding:3px 0;font-size:12px}
.stat-val{color:#FFD700;font-weight:600}
#action-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(0,0,0,.8);display:flex;justify-content:center;gap:8px;padding:10px;z-index:100;flex-wrap:wrap;backdrop-filter:blur(5px)}
.action-btn{background:#2a5a1a;color:#fff;border:2px solid #4a8c3f;padding:8px 16px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:600;transition:.2s;display:flex;align-items:center;gap:6px}
.action-btn:hover{background:#3a7a2a;border-color:#FFD700;transform:scale(1.05)}
.action-btn:active{transform:scale(.95)}
.action-btn.disabled{opacity:.4;cursor:not-allowed}
#modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;justify-content:center;align-items:center}
#modal.show{display:flex}
#modal-content{background:#fff;border-radius:16px;padding:24px;max-width:400px;width:90%;max-height:80vh;overflow-y:auto;text-align:center}
#modal-content h2{color:#2a5a1a;margin-bottom:12px}
#modal-content p{color:#555;margin-bottom:8px;font-size:14px}
#modal-content .btn-row{display:flex;gap:8px;justify-content:center;margin-top:16px;flex-wrap:wrap}
#modal-content button{padding:10px 20px;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;transition:.15s}
#modal-content button:hover{transform:scale(1.05)}
.btn-yes{background:#27ae60;color:#fff}
.btn-no{background:#e74c3c;color:#fff}
.btn-ok{background:#3498db;color:#fff}
.btn-gold{background:#f39c12;color:#fff}
#notification{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.85);color:#FFD700;padding:16px 30px;border-radius:12px;font-size:16px;font-weight:700;z-index:300;pointer-events:none;opacity:0;transition:opacity .3s;text-align:center}
#notification.show{opacity:1}
#baby-animation{position:fixed;inset:0;z-index:250;display:none;justify-content:center;align-items:center;background:rgba(0,0,0,.8)}
#baby-animation.show{display:flex}
.baby-content{text-align:center;animation:babyPop .6s ease-out}
.baby-content .big-emoji{font-size:100px}
.baby-content h2{color:#FFD700;font-size:28px;margin:10px 0}
.baby-content p{color:#fff;font-size:16px}
@keyframes babyPop{0%{transform:scale(0)}60%{transform:scale(1.2)}100%{transform:scale(1)}}
.sparkle{position:absolute;pointer-events:none;font-size:20px;animation:sparkleUp 1.5s ease-out forwards}
@keyframes sparkleUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-80px) scale(1.5)}}
</style>
</head>
<body>
<div id="game">
  <div id="sky">
    <div id="sun"></div>
  </div>
  <div id="ground">
    <div id="trees"></div>
    <div id="village"></div>
  </div>
</div>

<div id="family-panel">
  <h3>👨‍👩‍👧‍👦 Моя семья</h3>
  <div id="family-list"></div>
</div>

<div id="stats-panel">
  <h3>📊 Ресурсы</h3>
  <div class="stat"><span>💰 Золото</span><span class="stat-val" id="gold">100</span></div>
  <div class="stat"><span>🍎 Еда</span><span class="stat-val" id="food">50</span></div>
  <div class="stat"><span>⭐ Опыт</span><span class="stat-val" id="exp">0</span></div>
  <div class="stat"><span>📅 День</span><span class="stat-val" id="day">1</span></div>
  <div class="stat"><span>🏠 Дома</span><span class="stat-val" id="houseCount">1</span></div>
</div>

<div id="action-bar">
  <button class="action-btn" onclick="doFarm()">🌾 Пахать</button>
  <button class="action-btn" onclick="doHarvest()">🧺 Собрать урожай</button>
  <button class="action-btn" onclick="doFish()">🎣 Рыбачить</button>
  <button class="action-btn" onclick="doBuild()">🏠 Построить дом</button>
  <button class="action-btn" onclick="doMarket()">🛒 Рынок</button>
  <button class="action-btn" onclick="doFamilyAction()">💕 Семья</button>
  <button class="action-btn" onclick="nextDay()">➡️ Следующий день</button>
</div>

<div id="modal"><div id="modal-content"></div></div>
<div id="notification"></div>
<div id="baby-animation">
  <div class="baby-content">
    <div class="big-emoji">👶</div>
    <h2>Родился малыш!</h2>
    <p id="baby-name"></p>
  </div>
</div>

<script>
let G = {
  gold: 100,
  food: 50,
  exp: 0,
  day: 1,
  plots: [
    {crop:null,growth:0,max:3},{crop:null,growth:0,max:3},
    {crop:null,growth:0,max:3},{crop:null,growth:0,max:3},
    {crop:null,growth:0,max:3},{crop:null,growth:0,max:3}
  ],
  family: [
    {name:"Папа",role:"Отец",emoji:"👨",mood:"😊",age:30,hunger:100},
    {name:"Мама",role:"Мать",emoji:"👩",mood:"😊",age:28,hunger:100}
  ],
  buildings: [{type:"house",level:1}],
  fishCooldown: 0
};

const CROPS = [
  {name:"Пшеница",emoji:"🌾",food:5,gold:3,time:2},
  {name:"Морковь",emoji:"🥕",food:8,gold:4,time:3},
  {name:"Картошка",emoji:"🥔",food:10,gold:5,time:3},
  {name:"Тыква",emoji:"🎃",food:15,gold:8,time:4},
  {name:"Арбуз",emoji:"🍉",food:20,gold:12,time:5}
];

const BABY_NAMES_М = ["Миша","Дима","Артём","Кирилл","Максим","Лёша","Матвей","Даниил"];
const BABY_NAMES_Ж = ["Маша","Аня","Полина","Соня","Вера","Настя","Даша","Милана"];

function save(){localStorage.setItem('village_save',JSON.stringify(G))}
function load(){const s=localStorage.getItem('village_save');if(s){const d=JSON.parse(s);Object.assign(G,d)}}

function render(){
  document.getElementById('gold').textContent=G.gold;
  document.getElementById('food').textContent=G.food;
  document.getElementById('exp').textContent=G.exp;
  document.getElementById('day').textContent=G.day;
  document.getElementById('houseCount').textContent=G.buildings.length;
  renderFamily();
  renderVillage();
  renderTrees();
  renderClouds();
}

function renderFamily(){
  const el=document.getElementById('family-list');
  el.innerHTML=G.family.map(m=>`<div class="member"><div class="member-avatar">${m.emoji}</div><div class="member-info"><div class="member-name">${m.name}</div><div class="member-role">${m.role} · ${m.age} лет</div><div class="member-mood">${m.mood} Голод: ${m.hunger}%</div></div></div>`).join('');
}

function renderVillage(){
  const v=document.getElementById('village');
  let html='';
  G.buildings.forEach((b,i)=>{
    const h=50+b.level*15;
    const w=50+b.level*10;
    const colors=['#e74c3c','#3498db','#e67e22','#9b59b6','#1abc9c'];
    const ci=i%colors.length;
    const lit=Math.random()>.4;
    html+=`<div class="building" style="width:${w}px" onclick="clickBuilding(${i})">
      <div class="roof" style="background:${colors[ci]};width:${w+10}px"></div>
      <div class="house" style="background:#f5deb3;height:${h}px;width:${w}px">
        <div class="window l" style="top:20%;left:15%;${lit?'':''}"></div>
        <div class="window r" style="top:20%;right:15%;${lit?'':''}"></div>
        <div class="door"></div>
      </div>
      <div class="building-label">Дом ${i+1}</div>
    </div>`;
  });
  G.plots.forEach((p,i)=>{
    const crop=p.crop?CROPS[p.crop]:null;
    let content='';
    if(!crop) content='🟫';
    else if(p.growth>=p.max) content=crop.emoji;
    else content='🌱';
    html+=`<div class="farm-plot" onclick="plantCrop(${i})" title="${crop?crop.name+` (${p.growth}/${p.max})`:'Пусто - кликни чтобы посадить'}">${content}</div>`;
  });
  v.innerHTML=html;
}

function renderTrees(){
  const t=document.getElementById('trees');
  let html='';
  for(let i=0;i<8;i++){
    const x=5+i*12+Math.random()*5;
    const h=25+Math.random()*20;
    html+=`<div class="tree" style="left:${x}%;bottom:${Math.random()*5}%"><div class="tree-top" style="width:${30+Math.random()*20}px;height:${30+Math.random()*20}px;background:${Math.random()>.5?'#2d5a1e':'#3a7a2a'}"></div><div class="tree-trunk" style="height:${h}px"></div></div>`;
  }
  t.innerHTML=html;
}

function renderClouds(){
  const sky=document.getElementById('sky');
  sky.querySelectorAll('.cloud').forEach(c=>c.remove());
  for(let i=0;i<4;i++){
    const c=document.createElement('div');
    c.className='cloud';
    c.style.cssText=`top:${20+Math.random()*80}px;left:${Math.random()*80}%;width:${60+Math.random()*80}px;height:${20+Math.random()*15}px`;
    const before=document.createElement('div');
    before.style.cssText=`width:${30+Math.random()*20}px;height:${30+Math.random()*20}px;top:-${10+Math.random()*10}px;left:${10+Math.random()*20}px`;
    const after=document.createElement('div');
    after.style.cssText=`width:${25+Math.random()*15}px;height:${25+Math.random()*15}px;top:-${5+Math.random()*10}px;right:${10+Math.random()*15}px`;
    c.appendChild(before);c.appendChild(after);sky.appendChild(c);
  }
}

function notify(msg){
  const el=document.getElementById('notification');
  el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2000);
}

function showModal(html){
  document.getElementById('modal-content').innerHTML=html;
  document.getElementById('modal').classList.add('show');
}
function hideModal(){document.getElementById('modal').classList.remove('show')}

function sparkle(x,y){
  const emojis=['✨','⭐','💛','🌟'];
  for(let i=0;i<5;i++){
    const s=document.createElement('div');
    s.className='sparkle';
    s.textContent=emojis[Math.floor(Math.random()*emojis.length)];
    s.style.left=(x+Math.random()*40-20)+'px';
    s.style.top=(y+Math.random()*40-20)+'px';
    document.body.appendChild(s);
    setTimeout(()=>s.remove(),1500);
  }
}

// === ACTIONS ===
function plantCrop(plotIdx){
  const p=G.plots[plotIdx];
  if(p.crop!==null){
    if(p.growth>=p.max){
      notify('Уже можно собрать! 🧺');
    } else {
      notify(`Растёт... ${p.growth}/${p.max} дней`);
    }
    return;
  }
  let html='<h2>🌾 Выбери культуру</h2>';
  CROPS.forEach((c,i)=>{
    html+=`<p>${c.emoji} ${c.name} — 🍎${c.food} еды, 💰${c.gold} золота, ⏰${c.time} дней</p>`;
  });
  html+='<div class="btn-row">';
  CROPS.forEach((c,i)=>{
    html+=`<button class="btn-yes" onclick="G.plots[${plotIdx}].crop=${i};G.plots[${plotIdx}].growth=0;G.plots[${plotIdx}].max=${c.time};hideModal();notify('${c.emoji} ${c.name} посажена!');render();save()">${c.emoji}</button>`;
  });
  html+=`<button class="btn-no" onclick="hideModal()">Отмена</button></div>`;
  showModal(html);
}

function doFarm(){
  if(G.food<2){notify('Нужна хотя бы 1 еда! 🍎');return}
  G.food-=1;G.exp+=2;
  const freePlot=G.plots.findIndex(p=>p.crop===null);
  if(freePlot>=0){
    plantCrop(freePlot);
  } else {
    notify('Все грядки заняты! Собери урожай 🧺');
  }
  render();save();
}

function doHarvest(){
  let收获=0;
  G.plots.forEach((p,i)=>{
    if(p.crop!==null&&p.growth>=p.max){
      const c=CROPS[p.crop];
      G.food+=c.food;G.gold+=c.gold;G.exp+=5;
     收获++;p.crop=null;p.growth=0;
      sparkle(window.innerWidth/2-50+i*60,window.innerHeight/2);
    }
  });
  if(收获>0){
    notify(`Собрано ${收获} урожаев! 🎉`);
  } else {
    notify('Нечего собирать 😅');
  }
  render();save();
}

function doFish(){
  if(G.food<3){notify('Нужна еда для рыбалки! 🍎');return}
  if(G.fishCooldown>0){notify(`Подожди ${G.fishCooldown} дн.`);return}
  G.food-=3;
  const luck=Math.random();
  if(luck>.7){
    const gold=Math.floor(10+Math.random()*30);
    G.gold+=gold;G.exp+=8;
    notify(`Поймал рыбу! +💰${gold}`);
  } else if(luck>.3){
    const food=Math.floor(5+Math.random()*10);
    G.food+=food;G.exp+=4;
    notify(`Поймал рыбку! +🍎${food}`);
  } else {
    notify('Рыба не клюнула... 🎣');
  }
  G.fishCooldown=1;
  render();save();
}

function doBuild(){
  const cost=50+G.buildings.length*30;
  showModal(`<h2>🏠 Построить дом</h2>
    <p>Стоимость: 💰${cost} золота</p>
    <p>У тебя: 💰${G.gold} золота</p>
    <p>Дома: ${G.buildings.length}</p>
    <div class="btn-row">
      <button class="btn-yes" onclick="buildHouse(${cost})">Построить</button>
      <button class="btn-no" onclick="hideModal()">Отмена</button>
    </div>`);
}

function buildHouse(cost){
  if(G.gold<cost){notify('Недостаточно золота! 💰');hideModal();return}
  G.gold-=cost;
  G.buildings.push({type:'house',level:1});
  G.exp+=20;
  notify('🏠 Новый дом построен!');
  hideModal();render();save();
}

function doMarket(){
  showModal(`<h2>🛒 Рынок</h2>
    <div class="btn-row" style="flex-direction:column;align-items:center;gap:10px">
      <button class="btn-yes" onclick="buyFood()">🍎 Купить еду (💰10 → 🍎20)</button>
      <button class="btn-yes" onclick="buyGold()">💰 Продать еду (🍎15 → 💰10)</button>
      <button class="btn-no" onclick="hideModal()">Закрыть</button>
    </div>`);
}

function buyFood(){
  if(G.gold<10){notify('Нужно 💰10 золота');return}
  G.gold-=10;G.food+=20;G.exp+=2;
  notify('Куплено 🍎20 еды!');hideModal();render();save();
}
function buyGold(){
  if(G.food<15){notify('Нужно 🍎15 еды');return}
  G.food-=15;G.gold+=10;G.exp+=2;
  notify('Продано! +💰10');hideModal();render();save();
}

function doFamilyAction(){
  const adults=G.family.filter(m=>m.role==='Отец'||m.role==='Мать');
  const canBaby=adults.length>=2&&G.buildings.length>=1&&G.gold>=30&&G.food>=20;
  showModal(`<h2>💕 Семья</h2>
    <p>Членов семьи: ${G.family.length}</p>
    <p>🏠 Домов: ${G.buildings.length}</p>
    <div class="btn-row" style="flex-direction:column;align-items:center;gap:10px">
      ${canBaby?`<button class="btn-gold" onclick="haveBaby()">👶 Родить ребёнка (💰30 🍎20)</button>`:`<button class="action-btn disabled">👶 Нужен дом + 💰30 🍎20</button>`}
      <button class="btn-ok" onclick="feedFamily()">🍎 Покормить семью</button>
      <button class="btn-no" onclick="hideModal()">Закрыть</button>
    </div>`);
}

function feedFamily(){
  const cost=G.family.length*3;
  if(G.food<cost){notify(`Нужно 🍎${cost} еды!`);return}
  G.food-=cost;
  G.family.forEach(m=>{m.hunger=Math.min(100,m.hunger+40);m.mood='😊'});
  G.exp+=3;
  notify(`Семья покормлена! -🍎${cost}`);
  hideModal();render();save();
}

function haveBaby(){
  if(G.gold<30||G.food<20){notify('Нужно 💰30 и 🍎20!');return}
  G.gold-=30;G.food-=20;
  const isBoy=Math.random()>.5;
  const namePool=isBoy?BABY_NAMES_М:BABY_NAMES_Ж;
  const name=namePool[Math.floor(Math.random()*namePool.length)];
  const baby={name,role:isBoy?'Сын':'Дочь',emoji:isBoy?'👦':'👧',mood:'😊',age:0,hunger:100};
  G.family.push(baby);
  G.exp+=50;

  hideModal();
  const babyEl=document.getElementById('baby-animation');
  document.getElementById('baby-name').textContent=`${name} (${isBoy?'мальчик':'девочка'})`;
  babyEl.classList.add('show');
  setTimeout(()=>{babyEl.classList.remove('show');render();save()},3000);
  sparkle(window.innerWidth/2,window.innerHeight/2);
}

function clickBuilding(i){
  showModal(`<h2>🏠 Дом ${i+1}</h2>
    <p>Уровень: ${G.buildings[i].level}</p>
    <p>Жильцов: ${G.family.length} из ${G.buildings.length*4}</p>
    <div class="btn-row">
      <button class="btn-yes" onclick="upgradeHouse(${i})">⬆️ Улучшить (💰${G.buildings[i].level*40})</button>
      <button class="btn-no" onclick="hideModal()">Закрыть</button>
    </div>`);
}

function upgradeHouse(i){
  const cost=G.buildings[i].level*40;
  if(G.gold<cost){notify('Недостаточно золота!');return}
  G.gold-=cost;G.buildings[i].level++;G.exp+=15;
  notify('🏠 Дом улучшен!');
  hideModal();render();save();
}

function nextDay(){
  G.day++;G.fishCooldown=Math.max(0,G.fishCooldown-1);
  G.plots.forEach(p=>{if(p.crop!==null&&p.growth<p.max)p.growth++});
  G.family.forEach(m=>{
    m.hunger=Math.max(0,m.hunger-10);
    if(m.hunger<=0){m.mood='😢';notify(`${m.name} голоден! Покорми семью!`)}
    else if(m.hunger<=30)m.mood='😟';
    else m.mood='😊';
    if(m.age<G.family.length*2)m.age++;
  });
  G.exp+=3;
  notify(`📅 День ${G.day}`);
  render();save();
}

load();
render();
</script>
</body>
</html>
